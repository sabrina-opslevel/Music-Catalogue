# cpp-netlib Hello Message Configuration
#
# This configuration file allows you to customize the hello message
# used throughout the cpp-netlib library.
#
# Configuration Options:
# ----------------------
#
# Environment Variable: CPPNETLIB_HELLO_MESSAGE
#   Set this environment variable to customize the hello message at runtime.
#   Example: export CPPNETLIB_HELLO_MESSAGE="Welcome to cpp-netlib!"
#
# Default Message:
#   If no custom message is configured, the default message is:
#   "Hello from cpp-netlib!"
#
# Usage Examples:
# ---------------
#
# 1. Using environment variable:
#    export CPPNETLIB_HELLO_MESSAGE="Custom greeting"
#    ./hello_message
#
# 2. Inline with command:
#    CPPNETLIB_HELLO_MESSAGE="Hi there!" ./hello_message
#
# 3. In your application:
#    #include <boost/network/hello.hpp>
#    std::string msg = boost::network::get_hello_message();
#
# Endpoints:
# ----------
#
# The following HTTP endpoints support hello messages:
#   /hello  - Returns the hello message with version information
#   /health - Returns health status with hello message
#
# Version Information:
# -------------------
#
# To get the hello message with version info, use:
#   boost::network::get_hello_message_with_version()
#
